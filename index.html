<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji API Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        [v-cloak] { display: none; }
        .platform-card:hover .icon-box { transform: scale(1.1) rotate(-5deg); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 font-sans leading-relaxed">

    <div id="app" v-cloak class="max-w-5xl mx-auto px-6 py-10 md:py-20">
        
        <header class="mb-16">
            <div class="inline-block px-4 py-1.5 mb-6 text-xs font-black tracking-widest text-blue-600 uppercase bg-blue-50 rounded-full">
                Unified Emoji Assets
            </div>
            <h1 class="text-4xl md:text-6xl font-black tracking-tight mb-6">表情资源 <span class="text-blue-600">托管中心</span></h1>
            <p class="text-slate-500 text-lg max-w-2xl font-medium">
                每个平台提供独立的 API 节点。通过下方链接预览资源，或直接调用静态资源接口。
            </p>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div 
                v-for="p in platforms" 
                :key="p.id"
                class="platform-card group bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 hover:shadow-2xl hover:shadow-blue-500/10 transition-all flex flex-col"
            >
                <div class="flex items-start justify-between mb-8">
                    <div :class="['icon-box w-16 h-16 rounded-2xl flex items-center justify-center text-3xl transition-all shadow-inner', p.bg]">
                        {{ p.icon }}
                    </div>
                    <a :href="p.id + '.html'" class="flex items-center gap-2 text-sm font-black text-blue-600 hover:text-blue-700">
                        进入预览 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
                    </a>
                </div>

                <h3 class="text-2xl font-black mb-3">{{ p.name }}</h3>
                <p class="text-slate-400 text-sm mb-6 font-medium">{{ p.desc }}</p>

                <div class="mt-auto">
                    <div class="text-[10px] font-black text-slate-400 uppercase tracking-tighter mb-2">Endpoint Example</div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 relative group/api">
                        <code class="text-xs font-mono text-slate-600 block break-all">
                            {{ baseHost }}/assets/{{ p.path }}/<span class="text-blue-500 font-bold">{id}</span>.png
                        </code>
                        <button 
                            @click="copy(baseHost + '/assets/' + p.path + '/{id}.png')"
                            class="absolute right-2 top-2 opacity-0 group-hover/api:opacity-100 p-2 bg-white shadow-sm rounded-lg hover:bg-slate-100 transition-all"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <footer class="mt-20 pt-10 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-slate-300 text-sm font-bold tracking-tight">© 2026 EMOJI-HUB SERVICE</div>
            <div class="flex gap-8 text-slate-400 text-sm font-bold">
                <span class="hover:text-blue-500 cursor-pointer">Status: Online</span>
                <span class="hover:text-blue-500 cursor-pointer">Docs</span>
            </div>
        </footer>

    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                // 修改为你实际的域名
                const baseHost = ref('https://emoji.awkchan.top');

                const platforms = ref([
                    { 
                        id: 'tieba', 
                        name: '百度贴吧', 
                        path: 'tieba', 
                        icon: '🐾', 
                        bg: 'bg-blue-50',
                        desc: '经典 image_emoticon 系列资源，提供高清 PNG 格式。' 
                    },
                    { 
                        id: 'xhs', 
                        name: '小红书', 
                        path: 'rednote', 
                        icon: '📕', 
                        bg: 'bg-red-50',
                        desc: '适配小红书最新表情包 ID 规范。' 
                    },
                    { 
                        id: 'kuaishou', 
                        name: '快手', 
                        path: 'kuaishou', 
                        icon: '🎥', 
                        bg: 'bg-orange-50',
                        desc: '快手平台动态表情静态化资源汇总。' 
                    },
                    { 
                        id: 'heybox', 
                        name: '小黑盒', 
                        path: 'heybox', 
                        icon: '📦', 
                        bg: 'bg-zinc-100',
                        desc: '小黑盒社区表情，适配游戏风格图标。' 
                    }
                ]);

                const copy = (text) => {
                    const el = document.createElement('textarea');
                    el.value = text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    // 简单的反馈
                    alert('接口格式已复制');
                };

                return { baseHost, platforms, copy };
            }
        }).mount('#app');
    </script>
</body>
</html>
